<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Abayat Al-Omraa</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Amiri:wght@700&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
<style>
    :root { --primary: #1a1a1a; --accent: #c5a059; --bg: #f9f7f2; }
    body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; -webkit-tap-highlight-color: transparent; }
    .luxury-card { background: #fff; max-width: 400px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--accent); }
    .logo-area { text-align: center; margin-bottom: 25px; }
    .logo-area h1 { font-family: 'Amiri', serif; font-size: 32px; margin: 0; color: var(--primary); }
    .logo-area small { display: block; color: var(--accent); font-family: 'Cinzel', serif; letter-spacing: 1px; margin-top: 5px; }
    
    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: bold; color: #666; padding-right: 5px; }
    input, textarea { width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #fafafa; font-family: 'Tajawal', sans-serif; transition: 0.3s; }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); background: #fff; }
    textarea { resize: none; height: 80px; }

    .size-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #fbfbfb; padding: 15px; border-radius: 15px; border: 1px dashed #ddd; margin: 20px 0; }
    .btn-luxury { background: var(--primary); color: #fff; border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    
    /* النوافذ المنبثقة */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.7); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .modal-content { background: rgba(255, 255, 255, 0.9); padding: 30px 20px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; border: 2px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.1); animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    
    @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .modal-title { font-family: 'Amiri', serif; font-size: 26px; margin-bottom: 15px; color: var(--primary); border-bottom: 2px solid var(--accent); display: inline-block; padding-bottom: 5px; }
    .order-details-box { background: rgba(252, 250, 246, 0.85); padding: 20px; border-radius: 15px; text-align: right; margin-bottom: 20px; font-size: 15px; line-height: 1.8; color: var(--primary); border: 1px solid #f0e6d2; }
    .order-header { text-align: center; font-weight: bold; color: var(--accent); margin-bottom: 10px; font-size: 18px; }

    .btn-action { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 17px; margin-bottom: 12px; cursor: pointer; font-family: 'Tajawal', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; transition: 0.3s; box-sizing: border-box; }
    .btn-wa { background: #fff; color: #25D366; border: 2px solid #25D366; }
    .btn-copy { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
    .btn-close { background: none; color: #888; text-decoration: underline; font-size: 14px; cursor: pointer; border: none; }

    /* شاشة الشكر الكشخة */
    #thanksModal .modal-title { border-bottom: none; color: var(--accent); }
    .thanks-icon { font-size: 50px; margin-bottom: 15px; display: block; }
    .thanks-text { font-size: 18px; line-height: 1.6; margin-bottom: 20px; color: #444; }
</style>
</head>
<body>

<div class="luxury-card">
    <div class="logo-area">
        <h1>عبايات الأمراء</h1>
        <small>ABAYAT AL-OMRAA</small>
    </div>

    <div class="input-group">
        <label>الاسم الكامل</label>
        <input type="text" id="custName" placeholder="الاسم الثلاثي">
    </div>

    <div class="input-group">
        <label>رقم التواصل</label>
        <input type="tel" id="custPhone" placeholder="965xxxxxxxx">
    </div>

    <div class="input-group">
        <label>العنوان</label>
        <input type="text" id="custAddress" placeholder="المنطقة، القطعة، الشارع...">
    </div>

    <div class="input-group">
        <label>كود الموديل</label>
        <input type="text" id="abayaCode" placeholder="مثال: OM-2026">
    </div>

    <div class="size-grid">
        <div><label>الطول</label><input type="number" id="f_len" placeholder="00"></div>
        <div><label>الصدر</label><input type="number" id="f_chest" placeholder="00"></div>
        <div><label>الكتف</label><input type="number" id="f_sh" placeholder="00"></div>
        <div><label>الكم</label><input type="number" id="f_sl" placeholder="00"></div>
    </div>

    <div class="input-group">
        <label>ملاحظات إضافية</label>
        <textarea id="custNotes" placeholder="أي تفاصيل أخرى تودين إضافتها..."></textarea>
    </div>

    <button type="button" class="btn-luxury" id="submitBtn">إتمام الطلب</button>
</div>

<!-- نافذة تأكيد الطلب -->
<div id="optionModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-title">تأكيد الطلب</div>
        <div class="order-details-box" id="displayBox"></div>
        <a id="waLink" class="btn-action btn-wa" onclick="showThanks()">إرسال عبر واتساب</a>
        <button id="copyBtn" class="btn-action btn-copy" onclick="copyAndThanks()">نسخ التفاصيل</button>
        <button class="btn-close" onclick="document.getElementById('optionModal').style.display='none'">رجوع للتعديل</button>
    </div>
</div>

<!-- نافذة الشكر والتقدير الكشخة -->
<div id="thanksModal" class="modal-overlay">
    <div class="modal-content">
        <span class="thanks-icon">🦋</span>
        <div class="modal-title">شكراً لثقتكِ بنا</div>
        <p class="thanks-text">تم استلام طلبكِ بنجاح من <strong>عبايات الأمراء</strong>.<br>سنتواصل معكِ في أقرب وقت ممكن.</p>
        <button class="btn-luxury" onclick="location.reload()">العودة للمتجر</button>
    </div>
</div>

<script>
    var finalMsg = "";

    document.getElementById('submitBtn').addEventListener('click', function() {
        var name = document.getElementById('custName').value.trim();
        var phone = document.getElementById('custPhone').value.trim();
        var address = document.getElementById('custAddress').value.trim();
        var notes = document.getElementById('custNotes').value.trim() || 'لا يوجد';
        var code = document.getElementById('abayaCode').value || 'غير محدد';
        
        if(!name || !phone || !address) {
            alert("يرجى تعبئة الاسم ورقم التواصل والعنوان");
            return;
        }

        finalMsg = `🦋 طلب جديد - عبايات الأمراء 🦋\n` +
                  `---------------------------\n` +
                  `👤 الاسم: ${name}\n` +
                  `📞 الرقم: ${phone}\n` +
                  `📍 العنوان: ${address}\n` +
                  `👗 الموديل: ${code}\n` +
                  `📝 الملاحظات: ${notes}\n` +
                  `---------------------------\n` +
                  `📏 المقاسات:\n` +
                  `- الطول: ${document.getElementById('f_len').value || '-'}\n` +
                  `- الصدر: ${document.getElementById('f_chest').value || '-'}\n` +
                  `- الكتف: ${document.getElementById('f_sh').value || '-'}\n` +
                  `- الكم: ${document.getElementById('f_sl').value || '-'}\n` +
                  `---------------------------`;

        document.getElementById('displayBox').innerHTML = `
            <div class="order-header">🦋 طلب جديد 🦋</div>
            <div><strong>الاسم:</strong> ${name}</div>
            <div><strong>العنوان:</strong> ${address}</div>
            <div><strong>الموديل:</strong> ${code}</div>
            <div><strong>الملاحظات:</strong> ${notes}</div>
            <div style="border-top: 1px solid #e0d5bd; margin-top:10px; padding-top:10px;">
                <strong>المقاسات:</strong> ${document.getElementById('f_len').value || '0'}/${document.getElementById('f_chest').value || '0'}/${document.getElementById('f_sh').value || '0'}/${document.getElementById('f_sl').value || '0'}
            </div>
        `;

        document.getElementById('waLink').href = "https://wa.me/96598858151?text=" + encodeURIComponent(finalMsg);
        document.getElementById('optionModal').style.display = 'flex';
    });

    function showThanks() {
        setTimeout(() => {
            document.getElementById('optionModal').style.display = 'none';
            document.getElementById('thanksModal').style.display = 'flex';
        }, 1000);
    }

    function copyAndThanks() {
        const textArea = document.createElement("textarea");
        textArea.value = finalMsg;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        showThanks();
    }
</script>

</body>
</html>
