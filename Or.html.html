<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Abayat Al-Omraa</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Amiri:wght@700&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
<style>
    :root { --primary: #1a1a1a; --accent: #c5a059; --bg: #f9f7f2; }
    body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; -webkit-tap-highlight-color: transparent; }
    .luxury-card { background: #fff; max-width: 400px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--accent); }
    .logo-area { text-align: center; margin-bottom: 25px; }
    .logo-area h1 { font-family: 'Amiri', serif; font-size: 32px; margin: 0; color: var(--primary); }
    .logo-area small { display: block; color: var(--accent); font-family: 'Cinzel', serif; letter-spacing: 1px; margin-top: 5px; }
    
    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: bold; color: #666; padding-right: 5px; }
    input, textarea { width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #fafafa; font-family: 'Tajawal', sans-serif; }
    input:focus { outline: none; border-color: var(--accent); background: #fff; }

    .size-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #fbfbfb; padding: 15px; border-radius: 15px; border: 1px dashed #ddd; margin: 20px 0; }
    .btn-luxury { background: var(--primary); color: #fff; border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    
    /* النافذة المنبثقة المحدثة */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
    .modal-content { background: #fff; padding: 30px 20px; border-radius: 25px; width: 85%; max-width: 340px; text-align: center; animation: popIn 0.3s ease; }
    @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .modal-title { font-family: 'Amiri', serif; font-size: 24px; margin-bottom: 10px; color: var(--primary); }
    .modal-desc { font-size: 14px; color: #777; margin-bottom: 20px; }
    
    .btn-action { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; margin-bottom: 12px; cursor: pointer; font-family: 'Tajawal', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
    .btn-wa { background: #25D366; color: #fff; }
    .btn-copy { background: #444; color: #fff; }
    .btn-close { background: none; color: #999; text-decoration: underline; font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>

<div class="luxury-card">
    <div class="logo-area">
        <h1>عبايات الأمراء</h1>
        <small>ABAYAT AL-OMRAA</small>
    </div>

    <div class="input-group">
        <label>الاسم الكامل</label>
        <input type="text" id="custName" placeholder="">
    </div>

    <div class="input-group">
        <label>رقم التواصل</label>
        <input type="tel" id="custPhone" placeholder="965xxxxxxxx">
    </div>

    <div class="input-group">
        <label>كود الموديل</label>
        <input type="text" id="abayaCode" placeholder="مثال: OM-2026">
    </div>

    <div class="size-grid">
        <div><label>الطول</label><input type="number" id="f_len" placeholder="00"></div>
        <div><label>الصدر</label><input type="number" id="f_chest" placeholder="00"></div>
        <div><label>الكتف</label><input type="number" id="f_sh" placeholder="00"></div>
        <div><label>الكم</label><input type="number" id="f_sl" placeholder="00"></div>
    </div>

    <button type="button" class="btn-luxury" id="submitBtn">إتمام الطلب</button>
</div>

<div id="optionModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-title">تأكيد الطلب</div>
        <div class="modal-desc">اختاري الطريقة المناسبة لإرسال طلبك:</div>
        
        <a id="waLink" class="btn-action btn-wa">
            <span>إرسال عبر واتساب</span>
        </a>

        <button id="copyBtn" class="btn-action btn-copy">
            <span>نسخ تفاصيل الطلب</span>
        </button>

        <button class="btn-close" onclick="document.getElementById('optionModal').style.display='none'">رجوع للتعديل</button>
    </div>
</div>

<script>
    var finalMsg = "";

    document.getElementById('submitBtn').addEventListener('click', function() {
        var name = document.getElementById('custName').value.trim();
        var phone = document.getElementById('custPhone').value.trim();
        
        if(!name || !phone) {
            alert("يرجى كتابة الاسم ورقم التواصل أولاً");
            return;
        }

        finalMsg = `*طلب جديد من عبايات الأمراء*\n` +
                  `---------------------------\n` +
                  `👤 الاسم: ${name}\n` +
                  `📞 الرقم: ${phone}\n` +
                  `👗 الموديل: ${document.getElementById('abayaCode').value || 'غير محدد'}\n` +
                  `---------------------------\n` +
                  `📏 المقاسات:\n` +
                  `- الطول: ${document.getElementById('f_len').value || '-'}\n` +
                  `- الصدر: ${document.getElementById('f_chest').value || '-'}\n` +
                  `- الكتف: ${document.getElementById('f_sh').value || '-'}\n` +
                  `- الكم: ${document.getElementById('f_sl').value || '-'}\n` +
                  `---------------------------`;

        var waUrl = "https://wa.me/96598858151?text=" + encodeURIComponent(finalMsg);
        document.getElementById('waLink').href = waUrl;
        document.getElementById('optionModal').style.display = 'flex';
    });

    // كود النسخ المتوافق مع الأيفون والواتساب
    document.getElementById('copyBtn').addEventListener('click', function() {
        const textArea = document.createElement("textarea");
        textArea.value = finalMsg;
        document.body.appendChild(textArea);
        textArea.select();
        textArea.setSelectionRange(0, 99999);
        try {
            document.execCommand('copy');
            alert("✅ تم نسخ الطلب بنجاح");
        } catch (err) {
            alert("تعذر النسخ التلقائي، يرجى النسخ يدوياً");
        }
        document.body.removeChild(textArea);
    });
</script>

</body>
</html>
